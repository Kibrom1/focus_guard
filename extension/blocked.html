<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Site Blocked — Focus Guard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f7ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #111827;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(99, 102, 241, 0.12);
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    .shield { font-size: 56px; margin-bottom: 16px; line-height: 1; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .domain {
      display: inline-block;
      font-size: 16px;
      font-weight: 600;
      color: #6366f1;
      background: #e0e7ff;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .timer-label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .countdown {
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: #111827;
      margin-bottom: 8px;
    }

    .session-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .quote {
      font-size: 13px;
      color: #9ca3af;
      font-style: italic;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-back {
      display: inline-block;
      padding: 10px 28px;
      background: white;
      color: #6b7280;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-back:hover { border-color: #6366f1; color: #6366f1; }

    .logo {
      margin-top: 32px;
      font-size: 12px;
      color: #d1d5db;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #111827;
        color: #f9fafb;
      }
      .card {
        background: #1f2937;
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      }
      h1 { color: #f9fafb; }
      .domain {
        color: #818cf8;
        background: #1e1b4b;
      }
      .countdown { color: #f9fafb; }
      .quote { color: #9ca3af; }
      .session-label { color: #9ca3af; }
      .btn-back {
        background: #1f2937;
        color: #d1d5db;
        border-color: #4b5563;
      }
      .btn-back:hover { border-color: #818cf8; color: #818cf8; }
      .logo { color: #6b7280; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield">🛡</div>
    <h1>Stay focused.</h1>
    <div class="domain" id="domain-display">this site</div>
    <div class="timer-label">Session ends in</div>
    <div class="countdown" id="countdown">--:--</div>
    <div class="session-label" id="session-label">Focus session in progress</div>
    <p class="quote" id="motivational-quote"></p>
    <button class="btn-back" id="btn-go-back">← Go Back</button>
    <div class="logo">FOCUS GUARD</div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
