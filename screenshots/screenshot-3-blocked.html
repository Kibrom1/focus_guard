<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Focus Guard — Screenshot 3: Blocked Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1280px; height: 800px; overflow: hidden; }

    body {
      min-height: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f7ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #111827;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(99, 102, 241, 0.12);
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    .shield { font-size: 56px; margin-bottom: 16px; line-height: 1; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .domain {
      display: inline-block;
      font-size: 16px;
      font-weight: 600;
      color: #6366f1;
      background: #e0e7ff;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .timer-label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .countdown {
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: #111827;
      margin-bottom: 8px;
    }

    .session-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .quote {
      font-size: 13px;
      color: #9ca3af;
      font-style: italic;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-back {
      display: inline-block;
      padding: 10px 28px;
      background: white;
      color: #6b7280;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .logo {
      margin-top: 32px;
      font-size: 12px;
      color: #d1d5db;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Caption bar */
    .caption-bar {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(79, 70, 229, 0.85);
      backdrop-filter: blur(8px);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 30px;
      letter-spacing: 0.01em;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield">🛡</div>
    <h1>Stay focused.</h1>
    <div class="domain">reddit.com</div>
    <div class="timer-label">Session ends in</div>
    <div class="countdown">19:47</div>
    <div class="session-label">Focus session in progress</div>
    <p class="quote">"Deep work is the superpower of the 21st century. — Cal Newport"</p>
    <button class="btn-back">← Go Back</button>
    <div class="logo">FOCUS GUARD</div>
  </div>

  <div class="caption-bar">Blocked page — a calm reminder to stay on task</div>
</body>
</html>
